openapi: 3.1.0
info:
  title: ShroudChain Settlement API
  version: 0.1.0
servers:
  - url: https://empathetic-truth-production.up.railway.app
paths:
  /order:
    post:
      summary: Create a swap order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "200":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
  /order/{orderId}:
    get:
      summary: Get order status
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current order state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
  /claim:
    post:
      summary: Claim code lookup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [claimCode]
              properties:
                claimCode:
                  type: string
      responses:
        "200":
          description: Claim code result
        "404":
          description: Invalid or unused claim code
components:
  schemas:
    CreateOrderRequest:
      type: object
      required: [orderId, fromToken, fromAmount, fromChain, xmrAddress]
      properties:
        orderId:
          type: string
        fromToken:
          type: string
        fromAmount:
          type: number
        fromChain:
          type: string
        xmrAddress:
          type: string
        fromAddress:
          type: string
    Order:
      type: object
      properties:
        orderId:
          type: string
        shroudTxId:
          type: string
        status:
          type: string
          enum: [pending, detected, sending, complete, failed]
        tx_hash:
          type: string
        xmr_tx_id:
          type: string
        claim_code:
          type: string

